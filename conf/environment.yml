name: rare-variant-gnn

# Channel priority: conda-forge first avoids solver conflicts.
# pytorch and pyg channels must come before defaults.
channels:
  - conda-forge
  - pytorch
  - nvidia
  - pyg
  - bioconda
  - defaults

dependencies:
  # ── Python ──────────────────────────────────────────────────────────────────
  - python=3.10

  # ── PyTorch (CUDA 11.8) ─────────────────────────────────────────────────────
  # Remove pytorch-cuda if running CPU-only; replace with cpuonly instead.
  - pytorch=2.1.0
  - torchvision=0.16.0
  - pytorch-cuda=11.8          # omit on CPU-only machines
  # - cpuonly                  # uncomment this line for CPU-only installs

  # ── PyTorch Geometric (must match torch version) ────────────────────────────
  # pyg channel ships pre-built wheels for torch 2.1 + cuda 11.8
  - pyg=2.4.0
  - pytorch-scatter=2.1.2
  - pytorch-sparse=0.6.18
  - pytorch-cluster=1.6.3

  # ── Scientific Python ────────────────────────────────────────────────────────
  - numpy=1.24.3
  - pandas=2.0.3
  - scipy=1.11.3
  - scikit-learn=1.3.2

  # ── Bioinformatics ───────────────────────────────────────────────────────────
  - networkx=3.1
  - biopython=1.81
  - pysam=0.21.0
  # VEP is a Perl tool installed via bioconda — NOT a Python package.
  # It is called as a subprocess from annotate_variants.py.
  - ensembl-vep=110.1          # real bioconda package (Perl + data cache separate)

  # ── Visualization ────────────────────────────────────────────────────────────
  - matplotlib=3.8.0
  - seaborn=0.12.2

  # ── Experiment tracking & HPO ────────────────────────────────────────────────
  - tqdm=4.66.1
  - optuna=3.4.0
  - mlflow=2.8.1

  # ── Nextflow (local runs; skip if using a system-level install) ──────────────
  - nextflow=23.10.0

  # ── pip section: only packages not available on conda channels ───────────────
  - pip:
    - torch-geometric==2.4.0   # redundant if pyg channel succeeded; harmless to keep
